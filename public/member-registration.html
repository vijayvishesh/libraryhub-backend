<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Member Registration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
        sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .expiry-badge {
      display: inline-block;
      background: #fef3cd;
      color: #856404;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-top: 8px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .required::after {
      content: ' *';
      color: #e74c3c;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-row .form-group {
      margin-bottom: 20px;
    }

    .error {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .error.visible {
      display: block;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    button {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 16px;
      border-radius: 6px;
      display: none;
      margin-bottom: 20px;
      text-align: center;
    }

    .success-message.visible {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-size: 14px;
    }

    .loading.visible {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .alert {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.visible {
      display: block;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px;
      }

      .header h1 {
        font-size: 24px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Library Member Registration</h1>
      <p>Complete your registration to access the library</p>
      <div class="expiry-badge" id="expiryBadge">Expires in <span id="expiryTime">15:00</span></div>
    </div>

    <div class="alert alert-error" id="errorAlert"></div>
    <div class="success-message" id="successMessage">
      ✓ Registration completed successfully! You can now access the library.
    </div>

    <form id="memberForm">
      <div class="form-group">
        <label for="fullName" class="required">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" />
        <div class="error" id="fullNameError"></div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your.email@example.com" />
        <div class="error" id="emailError"></div>
      </div>

      <div class="form-group">
        <label for="mobileNo" class="required">Mobile Number</label>
        <input
          type="tel"
          id="mobileNo"
          name="mobileNo"
          placeholder="Enter your mobile number"
          pattern="[0-9]{10}"
          maxlength="10"
        />
        <div class="error" id="mobileNoError"></div>
      </div>

      <div class="form-group">
        <label for="aadharId">Aadhar ID</label>
        <input
          type="text"
          id="aadharId"
          name="aadharId"
          placeholder="Enter your Aadhar ID"
          pattern="[0-9]{12}"
          maxlength="12"
        />
        <div class="error" id="aadharIdError"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="duration" class="required">Duration (months)</label>
          <input type="number" id="duration" name="duration" placeholder="e.g., 3" min="1" />
          <div class="error" id="durationError"></div>
        </div>

        <div class="form-group">
          <label for="planAmount">Plan Amount (₹)</label>
          <input type="number" id="planAmount" name="planAmount" placeholder="Amount" min="0" />
          <div class="error" id="planAmountError"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="startDate">Start Date</label>
          <input type="date" id="startDate" name="startDate" />
          <div class="error" id="startDateError"></div>
        </div>

        <div class="form-group">
          <label for="endDate">End Date</label>
          <input type="date" id="endDate" name="endDate" />
          <div class="error" id="endDateError"></div>
        </div>
      </div>

      <div class="form-group">
        <label for="seatId">Seat ID</label>
        <input type="text" id="seatId" name="seatId" placeholder="Your assigned seat ID" />
        <div class="error" id="seatIdError"></div>
      </div>

      <div class="form-group">
        <label for="slotId">Slot ID</label>
        <input type="text" id="slotId" name="slotId" placeholder="Your time slot" />
        <div class="error" id="slotIdError"></div>
      </div>

      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status">
          <option value="">Select Status</option>
          <option value="ACTIVE">Active</option>
          <option value="INACTIVE">Inactive</option>
          <option value="SUSPENDED">Suspended</option>
        </select>
        <div class="error" id="statusError"></div>
      </div>

      <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" placeholder="Any additional notes..."></textarea>
      </div>

      <div class="loading" id="loading">
        <span class="spinner"></span> Submitting your registration...
      </div>

      <div class="button-group">
        <button type="submit" class="btn-submit" id="submitBtn">Register Now</button>
      </div>
    </form>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const TOKEN = new URLSearchParams(window.location.search).get('token') ||
      window.location.pathname.split('/').pop();
    let remainingSeconds = 900;

    const form = document.getElementById('memberForm');
    const loading = document.getElementById('loading');
    const errorAlert = document.getElementById('errorAlert');
    const successMessage = document.getElementById('successMessage');
    const expiryTime = document.getElementById('expiryTime');
    const submitBtn = document.getElementById('submitBtn');

    // Expiry countdown timer
    function startExpiryTimer() {
      updateExpiryDisplay();

      const interval = setInterval(() => {
        remainingSeconds--;
        if (remainingSeconds <= 0) {
          clearInterval(interval);
          submitBtn.disabled = true;
          showError('This invite link has expired. Please request a new one.');
          return;
        }
        updateExpiryDisplay();
      }, 1000);
    }

    function updateExpiryDisplay() {
      const minutes = Math.floor(remainingSeconds / 60);
      const seconds = remainingSeconds % 60;
      expiryTime.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    async function loadInviteDetails() {
      const response = await fetch(`${API_BASE}/api/public/members/invite/${TOKEN}/details`);
      if (!response.ok) {
        throw new Error('This invite link is invalid or expired.');
      }

      const payload = await response.json();
      remainingSeconds = payload?.data?.expiresIn ?? 0;
      if (remainingSeconds <= 0) {
        submitBtn.disabled = true;
        showError('This invite link has expired. Please request a new one.');
      }
    }

    function showError(message) {
      errorAlert.textContent = message;
      errorAlert.classList.add('visible');
      successMessage.classList.remove('visible');
    }

    function showSuccess() {
      successMessage.classList.add('visible');
      errorAlert.classList.remove('visible');
      form.style.display = 'none';
    }

    function hideLoading() {
      loading.classList.remove('visible');
      submitBtn.disabled = false;
    }

    function showLoading() {
      loading.classList.add('visible');
      submitBtn.disabled = true;
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      clearErrors();

      const formData = {
        fullName: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
        mobileNo: document.getElementById('mobileNo').value.trim(),
        aadharId: document.getElementById('aadharId').value.trim(),
        duration: document.getElementById('duration').value ? parseInt(document.getElementById('duration').value) : null,
        planAmount: document.getElementById('planAmount').value
          ? parseInt(document.getElementById('planAmount').value)
          : null,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        seatId: document.getElementById('seatId').value.trim(),
        slotId: document.getElementById('slotId').value.trim(),
        status: document.getElementById('status').value.trim(),
        notes: document.getElementById('notes').value.trim(),
      };

      // Client-side validation
      if (!formData.fullName) {
        showFieldError('fullName', 'Full name is required');
        return;
      }

      if (!formData.mobileNo || formData.mobileNo.length !== 10 || !/^\d+$/.test(formData.mobileNo)) {
        showFieldError('mobileNo', 'Valid 10-digit mobile number is required');
        return;
      }

      if (!formData.duration || formData.duration < 1) {
        showFieldError('duration', 'Duration must be at least 1 month');
        return;
      }

      showLoading();

      try {
        const response = await fetch(`${API_BASE}/api/public/members/invite/${TOKEN}/submit`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(formData),
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.message || 'Registration failed');
        }

        showSuccess();
      } catch (error) {
        showError(error.message || 'An error occurred. Please try again.');
        console.error('Submission error:', error);
      } finally {
        hideLoading();
      }
    });

    function showFieldError(fieldName, message) {
      const errorElement = document.getElementById(`${fieldName}Error`);
      if (errorElement) {
        errorElement.textContent = message;
        errorElement.classList.add('visible');
        document.getElementById(fieldName).focus();
      }
    }

    function clearErrors() {
      document.querySelectorAll('.error').forEach(el => {
        el.classList.remove('visible');
        el.textContent = '';
      });
      errorAlert.classList.remove('visible');
    }

    // Initialize
    loadInviteDetails()
      .then(() => startExpiryTimer())
      .catch(error => {
        submitBtn.disabled = true;
        showError(error.message || 'Unable to load invite details.');
      });
  </script>
</body>
</html>
